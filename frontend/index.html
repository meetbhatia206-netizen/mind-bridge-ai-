<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Saral Setu – Form Assistant</title>
  <meta name="description" content="Saral Setu – Your multilingual government form assistant. Fill forms easily in English or Hindi.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">

    <!-- SCREEN 1: Language Selection -->
    <div id="screen-language" class="screen full-center">
      <div class="glass-panel lang-panel animated-entry">
        <div class="lang-logo">
          <span class="logo-mark">सस</span>
          <span class="logo-text">Saral Setu</span>
        </div>
        <div class="lang-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/><path d="M2 12H22"/><path d="M12 2C14.5013 4.73835 15.9228 8.29203 16 12C15.9228 15.708 14.5013 19.2616 12 22C9.49872 19.2616 8.07725 15.708 8 12C8.07725 8.29203 9.49872 4.73835 12 2Z"/></svg>
        </div>
        <h1 class="lang-title">Select your language<span class="divider"></span>अपनी भाषा चुनें</h1>
        <div class="lang-buttons">
          <button class="btn-lang" data-lang="en">English</button>
          <button class="btn-lang" data-lang="hi">हिंदी</button>
        </div>
      </div>
    </div>

    <!-- SCREEN 2: Dashboard -->
    <div id="screen-dashboard" class="screen hidden">
      <header class="dashboard-header">
        <div class="header-brand">
          <span class="brand-mark">सस</span>
          <span class="brand-name">Saral Setu</span>
        </div>
        <div class="user-profile">
          <div class="avatar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="user-greeting">
            <span class="status-online">● Online</span>
            <span id="welcome-msg" class="welcome-text">Welcome!</span>
          </div>
        </div>
        <button id="btn-change-lang" class="icon-btn" title="Change Language">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/><path d="M2 12H22"/><path d="M12 2C14.5013 4.73835 15.9228 8.29203 16 12C15.9228 15.708 14.5013 19.2616 12 22C9.49872 19.2616 8.07725 15.708 8 12C8.07725 8.29203 9.49872 4.73835 12 2Z"/></svg>
        </button>
      </header>
      <div class="dashboard-content">
        <h2 id="dashboard-title" class="dashboard-title">How can I help you today?</h2>
        <p class="dashboard-subtitle" id="dashboard-subtitle">Select a form below to get started</p>
        <div id="form-grid" class="form-grid">
           <!-- Cards go here -->
           <div class="loading-spinner"></div>
        </div>
      </div>
    </div>

    <!-- SCREEN 3: Chatbot Interface -->
    <div id="screen-chat" class="screen layout-chat hidden">
      <!-- Left Sidebar -->
      <aside class="chat-sidebar glass-panel">
        <div class="sidebar-user-info">
          <div class="avatar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="user-details">
            <h3 id="sidebar-name">Guest User</h3>
            <span class="status-online">● Online</span>
          </div>
        </div>
        <div class="sidebar-chat-history">
          <h4 id="history-title">Chat History</h4>
          <ul id="chat-history-list" class="history-list">
            <!-- Populated dynamically via JS -->
            <li class="history-item empty-history">No past conversations</li>
          </ul>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main class="chat-main">
        <header class="chat-header glass-panel">
          <div class="chat-header-info">
            <button id="back-btn" class="icon-btn">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <h2 id="chat-form-title">Form Name</h2>
          </div>
          <div class="chat-header-actions">
            <button id="form-image-btn" class="btn-primary hidden">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <span>Preview</span>
            </button>
            <button id="preview-btn" class="btn-primary hidden">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
              <span id="preview-btn-text">Generate Smart Guide</span>
            </button>
          </div>
        </header>

        <div id="chat-area" class="chat-area">
          <!-- Chat bubbles injected here -->
        </div>

        <footer class="chat-footer glass-panel">
          <form id="chat-form">
            <div class="input-wrapper">
              <input type="text" id="user-input" autocomplete="off" placeholder="Type your answer...">
              <button type="submit" id="send-btn" class="btn-send">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </form>
        </footer>
      </main>
    </div>

  </div>

  <!-- Preview Modal -->
  <div id="preview-modal" class="modal hidden">
    <div class="modal-content glass-panel" style="max-width: 800px;">
      <div class="modal-header">
        <h2 id="modal-title">Smart Summary Guide</h2>
        <button id="close-modal" class="icon-btn">
           <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="preview-content" class="modal-body">
         <!-- Preview HTML injected here -->
      </div>
    </div>
  </div>

  <!-- Form Image Preview Modal -->
  <div id="form-image-modal" class="modal hidden">
    <div class="modal-content form-image-modal-content">
      <div class="modal-header">
        <h2>Aadhaar Form Preview</h2>
        <button id="close-form-image-modal" class="icon-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body form-image-body">
        <img src="preview.jpeg" alt="Aadhaar Enrollment Form Preview" class="form-preview-img">
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
